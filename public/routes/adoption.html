 <!DOCTYPE html>
 <html lang="en">
    <head>
        <head>
        <meta charset="UTF-8">
        <meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="../icon.png" type="image/png">

    <body style="background-color: black">
        <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
        <div id="crt-scrollable">
            <section id="view-cli" class="terminal-view">
                <nav class="nav-breadcrumbs">
                    <button onclick="window.location.href='../index.html'" class="nav-button" >home</button>
                    <button onclick="router.go('species-list')" class="nav-button" style="display: none;">species</button>
                    <hr class="cli-separator" style="border: black;">
                </nav>
                <div id="terminal-output">
                    <div class="table" id="species-list" style="display: grid;">
                        <!-- headers -->
                        <div class="table-header" style="grid-column: span 8;">SPECIES</div>
                        <div class="table-header">Total:</div>
                        <div class="table-header" style="text-align: right;">2</div>
                        <!-- values -->
                        <button onclick="router.go('embryos-list', )" 
                            class="row-button" 
                            style="grid-column: span 10; justify-self: start;">[SPECIES-1780857778991 | Aralodon minoris]</button>
                        <button onclick="router.go('embryos-list')" 
                            class="row-button" 
                            style="grid-column: span 10; justify-self: start;">[SPECIES-1780857944079 | Reodon fragilis]</button>
                    </div>
                    <div class="table" id="embryos-list" style="display: none;">
                        <!-- headers -->
                        <div class="table-header" style="grid-column: span 3;">EMBRYO-ID</div>
                        <div class="table-header" style="grid-column: span 3;">SPECIES</div>
                        <div class="table-header" style="grid-column: span 2;">STATUS</div>
                        <div class="table-header">EVP COST</div>
                        <div class="table-header">:</div>
                        <!-- values -->
                        <!-- examples -->
                        <div class="table-value" style="grid-column: span 3;">[EMBRYO-1773811141134]</div>
                        <div class="table-value" style="grid-column: span 3;">bla</div>
                        <div class="table-value" style="grid-column: span 2;">AVAILABLE</div>
                        <div class="table-value">❤️ 0</div>
                        <button class="table-button">ADOPT</button>
                    </div>
                    <!-- terminal lines will be injected here by cli.js -->
                </div>
            </section>
        </div>
    </body>
</html>
