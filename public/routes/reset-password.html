<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>M.A.G.P.I.E. - Password Reset</title>
        <style>
            body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
            form { background: #1a1a1a; display: inline-block; padding: 20px; border-radius: 8px; border: 1px solid #333; text-align: left; }
            input[type="password"] { padding: 10px; margin: 8px 0 15px 0; border-radius: 4px; border: 1px solid #444; width: 250px; background: #222; color: #fff; display: block; }
            button { background: #0070f3; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        </style>
    </head>
    <body>
        <!-- Traditional browser submission form -->
        <form action="/finalize-password-reset" method="POST">
            <h1>Reset Your M.A.G.P.I.E. Password</h1>
            <!-- Hidden input holds the url email token string securely -->
            <input type="hidden" name="token" id="tokenField" />
            <input type="hidden" name="email" id="emailField" />
            <label for="password">Enter New Password:</label>
            <input type="password" id="password" name="password" required minlength="6" placeholder="" />

            <label for="confirm_password">Confirm New Password:</label>
            <input type="password" id="confirm_password" required placeholder="" />

            <button type="submit">Update Password</button>
        </form>
        <div id="successMessage" style="display: none; padding: 20px;">
            <h1>Password updated successfully!</h1>
            <p>Your credentials have been secured. You can now close this window.</p>
        </div>
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has("success"))
            {
                document.querySelector("form").style.display = "none";
                document.getElementById("successMessage").style.display = "block";
            }
            else 
            {
                // 1. Automatically grab the token from the URL bar and stick it in the form
                document.getElementById('tokenField').value = urlParams.get("token");
                document.getElementById("emailField").value = urlParams.get("email");
                // 2. Real-time equality validator link mapping both inputs
                const password = document.getElementById("password");
                const confirm_password = document.getElementById("confirm_password");

                function validatePassword(){
                    if(password.value !== confirm_password.value) {
                        // If they don't match, block submission and pop open native browser warning bubble
                        confirm_password.setCustomValidity("Passwords do not match!");
                    } else {
                        // If they match, clear out errors so form submission goes through cleanly
                        confirm_password.setCustomValidity('');
                    }
                }
                // Trigger validation check instantly whenever the user types inside either box
                password.onchange = validatePassword;
                confirm_password.onkeyup = validatePassword;
            }
        </script>
    </body>
</html>
